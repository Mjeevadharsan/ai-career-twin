<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - AI Career Twin</title>
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-left">
            <div class="auth-illustration">
                <i class="fas fa-user-shield" style="font-size: 120px; color: #667eea;"></i>
                <h2>Administrator Access</h2>
                <p>Secure portal for system administrators</p>
            </div>
        </div>
        
        <div class="auth-right">
            <div class="auth-card">
                <div class="auth-header">
                    <i class="fas fa-shield-halved" style="font-size: 40px; color: #667eea;"></i>
                    <h1>Admin Login</h1>
                    <p>AI Career Twin - Administrator Portal</p>
                </div>
                
                <form id="loginForm" class="auth-form">
                    <div class="form-group">
                        <label>Admin Email</label>
                        <div class="input-with-icon">
                            <i class="fas fa-user-tie"></i>
                            <input type="email" id="username" placeholder="admin@careertwin.com" required>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>Password</label>
                        <div class="input-with-icon">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="password" placeholder="Enter admin password" required>
                        </div>
                    </div>
                    
                    <div id="error-message" class="error-message" style="display:none;"></div>
                    <div id="success-message" class="success-message" style="display:none;"></div>
                    
                    <button type="submit" class="btn-auth">
                        <i class="fas fa-sign-in-alt"></i> Admin Login
                    </button>
                </form>
                
                <div class="auth-footer">
                    <p><i class="fas fa-info-circle"></i> Admin access only</p>
                    <a href="login.html">← Student Login</a>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const errorMsg = document.getElementById('error-message');
            const successMsg = document.getElementById('success-message');
            
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';
            
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    if (data.role === 'ADMIN') {
                        successMsg.textContent = 'Login successful! Redirecting to admin dashboard...';
                        successMsg.style.display = 'block';
                        setTimeout(() => window.location.href = 'admin-dashboard.html', 1000);
                    } else {
                        errorMsg.textContent = 'Access denied. Admin credentials required.';
                        errorMsg.style.display = 'block';
                    }
                } else {
                    errorMsg.textContent = data.error || 'Invalid admin credentials';
                    errorMsg.style.display = 'block';
                }
            } catch (error) {
                errorMsg.textContent = 'Connection error. Please try again.';
                errorMsg.style.display = 'block';
            }
        });
    </script>
</body>
</html>
