<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome – AI Career Twin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/auth.css">
</head>
<body>

<div class="auth-bg">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
</div>

<div class="auth-page">
    <div class="auth-card" id="auth-card">

        <!-- Brand -->
        <a href="/home.html" class="brand">
            <div class="brand-icon"><i class="fa-solid fa-network-wired"></i></div>
            <span class="brand-name">AI Career <span>Twin</span></span>
        </a>

        <!-- Toggle Tabs -->
        <div class="auth-tabs">
            <button type="button" class="tab-btn active" id="tab-login" onclick="switchMode('login')">Login</button>
            <button type="button" class="tab-btn" id="tab-signup" onclick="switchMode('signup')">Sign Up</button>
            <div class="tab-slider"></div>
        </div>

        <!-- Header -->
        <div class="card-head">
            <h1 id="auth-title">Welcome back</h1>
            <p id="auth-subtitle">Sign in to access your AI Career Twin dashboard</p>
        </div>

        <!-- Message box -->
        <div class="msg-box" id="msg-box"></div>

        <!-- Form Wrapper -->
        <div class="form-container">
            
            <!-- Login Form -->
            <form id="login-form" onsubmit="handleLogin(event)" class="auth-form-animate" novalidate>
                <!-- Email -->
                <div class="field" id="fg-login-email">
                    <label for="login-email">Email or Username</label>
                    <div class="input-box">
                        <i class="fa-solid fa-envelope fi"></i>
                        <input type="text" id="login-email" placeholder="Enter your email or username" autocomplete="username" required>
                    </div>
                    <span class="field-err" id="err-login-email"></span>
                </div>

                <!-- Password -->
                <div class="field" id="fg-login-pwd">
                    <label for="login-pwd">Password</label>
                    <div class="input-box">
                        <i class="fa-solid fa-lock fi"></i>
                        <input type="password" id="login-pwd" placeholder="Enter your password" autocomplete="current-password" required>
                        <button type="button" class="eye-btn" onclick="togglePwd('login-pwd', this)" aria-label="Toggle password">
                            <i class="fa-solid fa-eye"></i>
                        </button>
                    </div>
                    <span class="field-err" id="err-login-pwd"></span>
                </div>

                <!-- Forgot -->
                <div class="forgot-row">
                    <a href="#">Forgot Password?</a>
                </div>

                <!-- Submit -->
                <button type="submit" class="btn-main" id="login-btn">
                    <span id="btn-text-login"><i class="fa-solid fa-arrow-right-to-bracket"></i> Login</span>
                    <span id="btn-load-login" class="hidden"><i class="fa-solid fa-spinner fa-spin"></i> Signing in…</span>
                </button>
            </form>

            <!-- Signup Form -->
            <form id="signup-form" onsubmit="handleSignup(event)" class="auth-form-animate hidden" novalidate>
                <!-- Full Name -->
                <div class="field" id="fg-reg-name">
                    <label for="reg-name">Full Name</label>
                    <div class="input-box">
                        <i class="fa-solid fa-user fi"></i>
                        <input type="text" id="reg-name" placeholder="Enter your full name" autocomplete="name" required>
                    </div>
                    <span class="field-err" id="err-reg-name"></span>
                </div>

                <!-- Email -->
                <div class="field" id="fg-reg-email">
                    <label for="reg-email">Email Address</label>
                    <div class="input-box">
                        <i class="fa-solid fa-envelope fi"></i>
                        <input type="email" id="reg-email" placeholder="you@example.com" autocomplete="email" required>
                    </div>
                    <span class="field-err" id="err-reg-email"></span>
                </div>

                <!-- Mobile -->
                <div class="field" id="fg-reg-mobile">
                    <label for="reg-mobile">Mobile Number</label>
                    <div class="input-box">
                        <i class="fa-solid fa-mobile-screen fi"></i>
                        <input type="tel" id="reg-mobile" placeholder="+91 XXXXX XXXXX" autocomplete="tel" maxlength="15" required>
                    </div>
                    <span class="field-err" id="err-reg-mobile"></span>
                </div>

                <!-- Password -->
                <div class="field" id="fg-reg-pwd">
                    <label for="reg-pwd">Password</label>
                    <div class="input-box">
                        <i class="fa-solid fa-lock fi"></i>
                        <input type="password" id="reg-pwd" placeholder="Min. 8 characters" autocomplete="new-password" required oninput="updateStrength()">
                        <button type="button" class="eye-btn" onclick="togglePwd('reg-pwd', this)" aria-label="Toggle password">
                            <i class="fa-solid fa-eye"></i>
                        </button>
                    </div>
                    <div class="str-track"><div class="str-fill" id="str-fill"></div></div>
                    <span class="str-lbl" id="str-lbl"></span>
                    <span class="field-err" id="err-reg-pwd"></span>
                </div>

                <!-- Confirm Password -->
                <div class="field" id="fg-reg-confirm">
                    <label for="reg-confirm">Confirm Password</label>
                    <div class="input-box">
                        <i class="fa-solid fa-shield-halved fi"></i>
                        <input type="password" id="reg-confirm" placeholder="Re-enter your password" autocomplete="new-password" required>
                        <button type="button" class="eye-btn" onclick="togglePwd('reg-confirm', this)" aria-label="Toggle confirm password">
                            <i class="fa-solid fa-eye"></i>
                        </button>
                    </div>
                    <span class="field-err" id="err-reg-confirm"></span>
                </div>

                <!-- Terms -->
                <label class="terms-row">
                    <input type="checkbox" id="reg-terms">
                    <span>I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></span>
                </label>

                <!-- Submit -->
                <button type="submit" class="btn-main" id="create-btn">
                    <span id="btn-text-reg"><i class="fa-solid fa-circle-nodes"></i> Create Account</span>
                    <span id="btn-load-reg" class="hidden"><i class="fa-solid fa-spinner fa-spin"></i> Creating…</span>
                </button>
            </form>

        </div>

        <div class="switch-link">
            <span id="switch-text-login">Don't have an account? <a href="javascript:void(0)" onclick="switchMode('signup')">Create Account</a></span>
            <span id="switch-text-reg" class="hidden">Already have an account? <a href="javascript:void(0)" onclick="switchMode('login')">Login</a></span>
            <br><br>
            <a href="/admin-login.html" style="color:#999;font-size:0.9rem;"><i class="fa-solid fa-shield-halved"></i> Admin Portal</a>
        </div>

    </div>

    <div class="auth-foot">
        <p>© 2026 AI Career Twin &nbsp;·&nbsp; B.E. CSE Final Year Project</p>
    </div>
</div>

<script>
function togglePwd(id, btn) {
    const inp = document.getElementById(id);
    const ic  = btn.querySelector('i');
    if (inp.type === 'password') {
        inp.type = 'text';
        ic.classList.replace('fa-eye', 'fa-eye-slash');
    } else {
        inp.type = 'password';
        ic.classList.replace('fa-eye-slash', 'fa-eye');
    }
}

function showMsg(text, type) {
    const el = document.getElementById('msg-box');
    el.textContent = text;
    el.className = 'msg-box ' + type;
    el.style.display = 'block';
}

function clearMsg() {
    const el = document.getElementById('msg-box');
    el.className = 'msg-box';
    el.style.display = 'none';
    el.textContent = '';
}

function switchMode(mode) {
    clearMsg();
    const card = document.getElementById('auth-card');
    const loginForm = document.getElementById('login-form');
    const signupForm = document.getElementById('signup-form');
    const tabLogin = document.getElementById('tab-login');
    const tabSignup = document.getElementById('tab-signup');
    const title = document.getElementById('auth-title');
    const subtitle = document.getElementById('auth-subtitle');
    const switchLogin = document.getElementById('switch-text-login');
    const switchReg = document.getElementById('switch-text-reg');

    if (mode === 'signup') {
        card.classList.add('mode-signup');
        tabLogin.classList.remove('active');
        tabSignup.classList.add('active');
        loginForm.classList.add('hidden');
        signupForm.classList.remove('hidden');
        title.textContent = 'Create your account';
        subtitle.textContent = 'Start your AI-powered career journey today';
        switchLogin.classList.add('hidden');
        switchReg.classList.remove('hidden');
        document.title = "Create Account – AI Career Twin";
        
        // Update URL parameter without reload
        window.history.replaceState(null, '', '?mode=signup');
    } else {
        card.classList.remove('mode-signup');
        tabLogin.classList.add('active');
        tabSignup.classList.remove('active');
        loginForm.classList.remove('hidden');
        signupForm.classList.add('hidden');
        title.textContent = 'Welcome back';
        subtitle.textContent = 'Sign in to access your AI Career Twin dashboard';
        switchLogin.classList.remove('hidden');
        switchReg.classList.add('hidden');
        document.title = "Login – AI Career Twin";
        
        // Update URL parameter without reload
        window.history.replaceState(null, '', '?mode=login');
    }
}

// ── Check query params on load ────────────────────
window.addEventListener('DOMContentLoaded', () => {
    const params = new URLSearchParams(window.location.search);
    if (params.get('mode') === 'signup') {
        switchMode('signup');
    } else {
        switchMode('login');
    }
});

// ── Password strength meter ──────────────────────
function updateStrength() {
    const v = document.getElementById('reg-pwd').value;
    let s = 0;
    if (v.length >= 8)           s++;
    if (/[A-Z]/.test(v))         s++;
    if (/[0-9]/.test(v))         s++;
    if (/[^A-Za-z0-9]/.test(v)) s++;
    const lvl = [
        {w:'0%',   c:'transparent', t:'',       css:''},
        {w:'25%',  c:'#ef4444',     t:'Weak',   css:'color:#ef4444'},
        {w:'50%',  c:'#f59e0b',     t:'Fair',   css:'color:#f59e0b'},
        {w:'75%',  c:'#3b82f6',     t:'Good',   css:'color:#3b82f6'},
        {w:'100%', c:'#10b981',     t:'Strong', css:'color:#10b981'},
    ][s];
    const fill = document.getElementById('str-fill');
    const lbl  = document.getElementById('str-lbl');
    fill.style.width      = lvl.w;
    fill.style.background = lvl.c;
    lbl.textContent       = lvl.t;
    lbl.setAttribute('style', lvl.css);
}

// ── Signup validation ────────────────────────────
function validateSignup() {
    let ok = true;
    const clear = id => { 
        document.getElementById('err-'+id).textContent=''; 
        document.getElementById('fg-'+id).classList.remove('valid','invalid'); 
    };
    const bad = (id, msg) => { 
        document.getElementById('err-'+id).textContent=msg; 
        document.getElementById('fg-'+id).classList.add('invalid'); 
        ok=false; 
    };
    const good = id => { 
        document.getElementById('fg-'+id).classList.add('valid'); 
    };

    ['reg-name','reg-email','reg-mobile','reg-pwd','reg-confirm'].forEach(clear);

    const name    = document.getElementById('reg-name').value.trim();
    const email   = document.getElementById('reg-email').value.trim();
    const mobile  = document.getElementById('reg-mobile').value.trim();
    const pwd     = document.getElementById('reg-pwd').value;
    const confirm = document.getElementById('reg-confirm').value;

    if (name.length < 2)                               bad('reg-name',    'Enter your full name.');       else good('reg-name');
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email))    bad('reg-email',   'Enter a valid email.');        else good('reg-email');
    if (!/^[+\d\s\-]{7,15}$/.test(mobile))            bad('reg-mobile',  'Enter a valid mobile number.'); else good('reg-mobile');
    if (pwd.length < 8)                                bad('reg-pwd',     'Password must be at least 8 characters.'); else good('reg-pwd');
    if (confirm !== pwd || confirm.length === 0)       bad('reg-confirm', 'Passwords do not match.');     else good('reg-confirm');

    return ok;
}

// ── Form loaders ─────────────────────────────────
function setLoginLoad(on) {
    document.getElementById('btn-text-login').classList.toggle('hidden', on);
    document.getElementById('btn-load-login').classList.toggle('hidden', !on);
    document.getElementById('login-btn').disabled = on;
}

function setRegLoad(on) {
    document.getElementById('btn-text-reg').classList.toggle('hidden', on);
    document.getElementById('btn-load-reg').classList.toggle('hidden', !on);
    document.getElementById('create-btn').disabled = on;
}

// ── Submit Handlers ──────────────────────────────
async function handleLogin(e) {
    e.preventDefault();

    const username = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-pwd').value;
    const errU = document.getElementById('err-login-email');
    const errP = document.getElementById('err-login-pwd');
    const fgU  = document.getElementById('fg-login-email');
    const fgP  = document.getElementById('fg-login-pwd');

    let ok = true;
    errU.textContent = ''; fgU.classList.remove('invalid','valid');
    errP.textContent = ''; fgP.classList.remove('invalid','valid');

    if (!username) { errU.textContent = 'Please enter your email or username.'; fgU.classList.add('invalid'); ok = false; }
    if (!password) { errP.textContent = 'Please enter your password.';          fgP.classList.add('invalid'); ok = false; }
    if (!ok) return;

    setLoginLoad(true);
    clearMsg();

    try {
        const res  = await fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });
        const data = await res.json();

        if (!res.ok) {
            showMsg(data.error || 'Invalid credentials. Please try again.', 'error');
            fgU.classList.add('invalid'); fgP.classList.add('invalid');
        } else {
            showMsg('Login successful! Redirecting…', 'success');
            setTimeout(() => { 
                if (data.role === 'ADMIN') {
                    window.location.href = '/admin-dashboard.html';
                } else {
                    window.location.href = '/'; 
                }
            }, 1200);
        }
    } catch {
        showMsg('Could not connect to server. Please try again.', 'error');
    } finally {
        setLoginLoad(false);
    }
}

async function handleSignup(e) {
    e.preventDefault();
    if (!validateSignup()) return;

    if (!document.getElementById('reg-terms').checked) {
        showMsg('Please accept the Terms of Service to continue.', 'error');
        return;
    }

    setRegLoad(true);
    clearMsg();
    const username = document.getElementById('reg-email').value.trim();
    const password = document.getElementById('reg-pwd').value;
    const fullName = document.getElementById('reg-name').value.trim();
    const mobile   = document.getElementById('reg-mobile').value.trim();

    try {
        const res  = await fetch('/api/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password, fullName, mobile })
        });
        const data = await res.json();

        if (!res.ok) {
            showMsg(data.error || 'Registration failed. Please try again.', 'error');
        } else {
            showMsg('Account created successfully! Switching to login…', 'success');
            setTimeout(() => { 
                switchMode('login'); 
                document.getElementById('login-email').value = username;
                document.getElementById('login-pwd').value = password;
            }, 1800);
        }
    } catch {
        showMsg('Could not connect to server. Please try again.', 'error');
    } finally {
        setRegLoad(false);
    }
}
</script>
</body>
</html>
