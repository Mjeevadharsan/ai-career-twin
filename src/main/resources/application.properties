# Configure Spring Boot server port
server.port=${PORT:5000}

# Optional: Disable verbose logging of database initialization
spring.main.banner-mode=off
logging.level.org.springframework.web=INFO

# H2 Embedded File Database (works on Render and locally with zero setup)
# Uses ./data/ folder locally, or /opt/render/project/src/data/ on Render (persistent disk)
spring.datasource.url=jdbc:h2:file:${H2_DB_PATH:./data}/careertwin;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=false
