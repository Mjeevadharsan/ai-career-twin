# Configure Spring Boot server port
server.port=${PORT:5001}

# Optional: Disable verbose logging of database initialization
spring.main.banner-mode=off
logging.level.org.springframework.web=INFO

# Local MySQL Database (localhost:3306)
# The database 'career_twin' will be created automatically on first run.
# If your MySQL root has a password, set it below (SPRING_DATASOURCE_PASSWORD env var or directly here).
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/career_twin?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.h2.console.enabled=false

# ── Email OTP Verification (Brevo HTTP API) ──
# Get API Key from Brevo Dashboard (SMTP & API -> API Keys)
brevo.api.key=${BREVO_API_KEY:YOUR_BREVO_API_KEY_HERE}
brevo.sender.email=aicareertwin@gmail.com
brevo.sender.name=AI Career Twin


