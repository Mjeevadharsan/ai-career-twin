# Configure Spring Boot server port
server.port=${PORT:5000}

# Optional: Disable verbose logging of database initialization
spring.main.banner-mode=off
logging.level.org.springframework.web=INFO

# H2 Embedded File Database (works on Render and locally with zero setup)
# Uses ./data/ folder locally, or /opt/render/project/src/data/ on Render (persistent disk)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/careertwin;MODE=MySQL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.h2.console.enabled=false
