services:
  # Spring Boot Backend (uses H2 embedded database - no external DB needed)
  - type: web
    name: ai-career-twin
    env: java
    rootDir: backend
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/twin-1.0.0.jar
    disk:
      name: h2-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
    envVars:
      - key: BREVO_API_KEY
        sync: false


  # React Frontend
  - type: web
    name: ai-career-twin-1
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://ai-career-twin.onrender.com
