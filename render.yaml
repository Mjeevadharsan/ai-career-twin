services:
  # Spring Boot Backend (uses H2 embedded database - no external DB needed)
  - type: web
    name: ai-career-twin
    env: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    disk:
      name: h2-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
    envVars:
      - key: BREVO_API_KEY
        sync: false
      - key: SPRING_DATASOURCE_URL
        value: jdbc:h2:file:/opt/render/project/src/data/career_twin;AUTO_SERVER=TRUE
      - key: SPRING_DATASOURCE_DRIVER_CLASS_NAME
        value: org.h2.Driver
      - key: SPRING_DATASOURCE_USERNAME
        value: sa
      - key: SPRING_DATASOURCE_PASSWORD
        value: sa
  # React Frontend
  - type: web
    name: ai-career-twin-1
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://ai-career-twin.onrender.com
